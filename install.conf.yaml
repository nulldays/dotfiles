- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- create:
    - ~/.local/bin

- link:
    ~/.bashrc: bashrc
    ~/.config/:
        glob: true
        path: config/*
    # globs only works for more than 1 file
    ~/.local/bin/scrapperchan:
        path: scripts/scrapperchan

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- create:
    - ~/Downloads
    - ~/.local/bin

- link:
    ~/.bashrc: bashrc
    ~/.config/:
        glob: true
        path: config/*
    # TODO: resolve the linking of "bin"
    #~/.local/bin/:
    #   glob: true
    #   path: bin/*

- shell:
    - [git submodule update --init --recursive, Installing submodules]
